<div class="tab-group">
  <div class="tab-list" role="tablist" aria-label="Documentation depth">
    @for (tab of tabs(); track tab.label();) {
      <button
        type="button"
        class="tab-button"
        role="tab"
        [class.active]="active() === tab"
        [attr.aria-selected]="active() === tab"
        (click)="active.set(tab)"
      >
        <span>{{ tab.label() }}</span>
      </button>
    }
  </div>

  <section class="tab-panel" role="tabpanel">
    @if (active(); as activeTab) {
      <ng-container *ngTemplateOutlet="activeTab.blueprint"></ng-container>
    }
  </section>
</div>
