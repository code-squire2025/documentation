<button
  [class.cta-presentation]="presentation() === 'cta'"
  [class.default-presentation]="presentation() === 'default'"
  [disabled]="disabled()"
  [type]="type()"
  (click)="onClick()">

  @if(icon(); as icon) {
    <sq-icon [icon]="icon"></sq-icon>
  }

  <ng-content></ng-content>

  @if(addArrow()) {
    <sq-icon class="arrow" [icon]="{ icon: 'chevron-right', type: 'lucide' }" [size]="18"/>
  }
</button>
